{% extends "base.html" %}
{% block title %}
    <title>แบบฟอร์มแก้ไขข้อมูล</title>
{% endblock %}
{% block page_title %}
[<span style="color: red;">Form</span>]
{% endblock %}
{% block content %}
    <div class="container-fluid d-flex justify-content-center align-items-center" style="height: 100vh;">
        <div class="container" style="max-width: 700px;">
            <h1 style="background-color: rgb(33, 86, 184); color: white; padding: 2% 3%; border-radius: 10px; font-weight: bolder; text-align: center;">
                แบบฟอร์มบันทึกข้อมูลประชากร
            </h1>
            <div class="container-s">
                <form style="border: solid black 1px; padding: 4% 5%; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);" action="/edit/{{ person.id }}/" method="POST"> {% csrf_token %} 
                    <div class="mb-3">
                        <label for="name" class="form-label">ชื่อประชากร</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="กรุณากรอกชื่อ-นามสกุล" value="{{ person.name }}">
                    </div>
    
                    <div class="mb-3">
                        <label for="age" class="form-label">อายุ</label>
                        <input type="text" class="form-control" id="age" name="age" placeholder="กรุณากรอกข้อมูลอายุเป็นตัวเลข" value="{{ person.age }}">
                    </div>

                    <div class="container d-flex justify-content-center gap-3">
                        <button type="submit" class="btn btn-success">อัปเดตข้อมูล</button>
                        <button type="reset" class="btn btn-danger">ล้างข้อมูล</button>
                    </div>
                </form>
            </div>    
        </div>
    </div>
{% endblock %}
